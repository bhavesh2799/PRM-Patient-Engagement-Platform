openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Hospital CRM & Patient Engagement Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: session
  - name: hospital
  - name: users
  - name: specializations
  - name: doctors
  - name: contact-variables
  - name: leads
  - name: appointments
  - name: segments
  - name: templates
  - name: template-requests
  - name: campaigns
  - name: wallet
  - name: invoices
  - name: channel-config
  - name: send-rules
  - name: notifications
  - name: dashboard

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Session / Role switcher ──────────────────────────────────────────────
  /session/role:
    get:
      operationId: getSessionRole
      tags: [session]
      summary: Get current active role
      responses:
        "200":
          description: Current role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionRole"
    put:
      operationId: setSessionRole
      tags: [session]
      summary: Switch active role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionRoleInput"
      responses:
        "200":
          description: Updated role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionRole"

  # ── Hospital ─────────────────────────────────────────────────────────────
  /hospital:
    get:
      operationId: getHospital
      tags: [hospital]
      summary: Get hospital profile
      responses:
        "200":
          description: Hospital profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hospital"
    patch:
      operationId: updateHospital
      tags: [hospital]
      summary: Update hospital profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HospitalUpdate"
      responses:
        "200":
          description: Updated hospital
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hospital"

  /hospital/reset:
    post:
      operationId: resetDemoData
      tags: [hospital]
      summary: Reset all demo data to seed
      responses:
        "200":
          description: Reset complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Users ─────────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Invite a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user role or active status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Specializations ───────────────────────────────────────────────────────
  /specializations:
    get:
      operationId: listSpecializations
      tags: [specializations]
      summary: List all specializations
      responses:
        "200":
          description: List of specializations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Specialization"
    post:
      operationId: createSpecialization
      tags: [specializations]
      summary: Create a specialization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpecializationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Specialization"

  /specializations/{id}:
    delete:
      operationId: deleteSpecialization
      tags: [specializations]
      summary: Delete a specialization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Doctors ───────────────────────────────────────────────────────────────
  /doctors:
    get:
      operationId: listDoctors
      tags: [doctors]
      summary: List all doctors
      parameters:
        - name: specialization
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of doctors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Doctor"
    post:
      operationId: createDoctor
      tags: [doctors]
      summary: Create a doctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorInput"
      responses:
        "201":
          description: Created doctor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"

  /doctors/{id}:
    get:
      operationId: getDoctor
      tags: [doctors]
      summary: Get a doctor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Doctor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"
    patch:
      operationId: updateDoctor
      tags: [doctors]
      summary: Update a doctor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorUpdate"
      responses:
        "200":
          description: Updated doctor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"
    delete:
      operationId: deleteDoctor
      tags: [doctors]
      summary: Delete a doctor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Contact Variables ──────────────────────────────────────────────────────
  /contact-variables:
    get:
      operationId: listContactVariables
      tags: [contact-variables]
      summary: List contact variables
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactVariable"
    post:
      operationId: createContactVariable
      tags: [contact-variables]
      summary: Create a contact variable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactVariableInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactVariable"

  /contact-variables/{id}:
    patch:
      operationId: updateContactVariable
      tags: [contact-variables]
      summary: Update a contact variable
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactVariableUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactVariable"
    delete:
      operationId: deleteContactVariable
      tags: [contact-variables]
      summary: Delete a contact variable
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Leads ─────────────────────────────────────────────────────────────────
  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List leads with optional filters
      parameters:
        - name: channel
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: ownerId
          in: query
          schema:
            type: integer
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: optedIn
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [leads]
      summary: Create a lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "201":
          description: Created lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get a lead with activity log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead with activity log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadDetail"
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update lead status, owner, etc.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadUpdate"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /leads/{id}/messages:
    get:
      operationId: getLeadMessages
      tags: [leads]
      summary: Get messages for a lead conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendLeadMessage
      tags: [leads]
      summary: Send a message to a lead (outreach)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /leads/simulate-inbound:
    post:
      operationId: simulateInboundMessage
      tags: [leads]
      summary: Simulate an inbound WhatsApp/chat message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulateInboundInput"
      responses:
        "201":
          description: Simulated lead/message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/csv-upload:
    post:
      operationId: uploadLeadsCsv
      tags: [leads]
      summary: Upload leads via CSV with column mapping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CsvUploadInput"
      responses:
        "200":
          description: Upload result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsvUploadResult"

  /leads/group-segment:
    post:
      operationId: groupLeadsIntoSegment
      tags: [leads]
      summary: Group selected leads into a new segment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupSegmentInput"
      responses:
        "201":
          description: Created segment from leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"

  # ── Appointments ──────────────────────────────────────────────────────────
  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: channel
          in: query
          schema:
            type: string
        - name: doctorId
          in: query
          schema:
            type: integer
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Create an appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Created appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}:
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get an appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: deleteAppointment
      tags: [appointments]
      summary: Delete an appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Segments ──────────────────────────────────────────────────────────────
  /segments:
    get:
      operationId: listSegments
      tags: [segments]
      summary: List all segments
      responses:
        "200":
          description: List of segments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Segment"
    post:
      operationId: createSegment
      tags: [segments]
      summary: Create a segment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SegmentInput"
      responses:
        "201":
          description: Created segment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"

  /segments/{id}:
    get:
      operationId: getSegment
      tags: [segments]
      summary: Get a segment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Segment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"
    delete:
      operationId: deleteSegment
      tags: [segments]
      summary: Delete a segment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /segments/{id}/refresh:
    post:
      operationId: refreshSegment
      tags: [segments]
      summary: Recompute segment count
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Refreshed segment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"

  /segments/{id}/export:
    post:
      operationId: exportSegment
      tags: [segments]
      summary: Export segment as CSV (simulated)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Export initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Templates ─────────────────────────────────────────────────────────────
  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List templates
      parameters:
        - name: channel
          in: query
          schema:
            type: string
        - name: goal
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Template"

  /templates/{id}:
    get:
      operationId: getTemplate
      tags: [templates]
      summary: Get a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
    patch:
      operationId: updateTemplate
      tags: [templates]
      summary: Update a template (AP Admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateUpdate"
      responses:
        "200":
          description: Updated template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"

  # ── Template Requests ─────────────────────────────────────────────────────
  /template-requests:
    get:
      operationId: listTemplateRequests
      tags: [template-requests]
      summary: List template requests
      responses:
        "200":
          description: List of template requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TemplateRequest"
    post:
      operationId: createTemplateRequest
      tags: [template-requests]
      summary: Request a new template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateRequestInput"
      responses:
        "201":
          description: Created template request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateRequest"

  /template-requests/{id}:
    patch:
      operationId: updateTemplateRequest
      tags: [template-requests]
      summary: Update template request (AP Admin approve/reject)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateRequestUpdate"
      responses:
        "200":
          description: Updated template request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateRequest"

  # ── Campaigns ─────────────────────────────────────────────────────────────
  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List campaigns
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a campaign draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignInput"
      responses:
        "201":
          description: Created campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    patch:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update a campaign draft
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignUpdate"
      responses:
        "200":
          description: Updated campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}/submit:
    post:
      operationId: submitCampaign
      tags: [campaigns]
      summary: Submit campaign for manager approval
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Submitted campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}/approve:
    post:
      operationId: approveCampaign
      tags: [campaigns]
      summary: Approve campaign — runs compliance gate, debits wallet, goes live
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approval result with compliance checks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignApprovalResult"

  /campaigns/{id}/pause:
    post:
      operationId: pauseCampaign
      tags: [campaigns]
      summary: Pause a live campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Paused campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}/metrics:
    get:
      operationId: getCampaignMetrics
      tags: [campaigns]
      summary: Get campaign metrics
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignMetrics"

  # ── Wallet ─────────────────────────────────────────────────────────────────
  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Get wallet balance and transactions
      responses:
        "200":
          description: Wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/topup:
    post:
      operationId: topupWallet
      tags: [wallet]
      summary: Add money to wallet (simulated PayU/Easebuzz)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletTopupInput"
      responses:
        "200":
          description: Updated wallet
          content:
