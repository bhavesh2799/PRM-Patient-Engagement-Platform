components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # ── Session ─────────────────────────────────────────────────────────────
    SessionRole:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [exec, manager, ap_admin]
        userId:
          type: ["integer", "null"]

    SessionRoleInput:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [exec, manager, ap_admin]

    # ── Hospital ────────────────────────────────────────────────────────────
    Hospital:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        logo:
          type: ["string", "null"]
        primaryColor:
          type: string
        contact:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        simplifiedMode:
          type: boolean

    HospitalUpdate:
      type: object
      properties:
        name:
          type: string
        logo:
          type: string
        primaryColor:
          type: string
        contact:
          type: string
        address:
          type: string
        simplifiedMode:
          type: boolean

    # ── User ────────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, name, email, role, active]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [exec, manager, ap_admin]
        active:
          type: boolean

    UserInput:
      type: object
      required: [name, email, role]
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [exec, manager, ap_admin]

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [exec, manager, ap_admin]
        active:
          type: boolean

    # ── Specialization ───────────────────────────────────────────────────────
    Specialization:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    SpecializationInput:
      type: object
      required: [name]
      properties:
        name:
          type: string

    # ── Doctor ────────────────────────────────────────────────────────────────
    Doctor:
      type: object
      required: [id, name, specialization, active]
      properties:
        id:
          type: integer
        name:
          type: string
        specialization:
          type: string
        qualifications:
          type: ["string", "null"]
        experience:
          type: ["integer", "null"]
        active:
          type: boolean
        email:
          type: ["string", "null"]
        mobile:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        registrationNumber:
          type: ["string", "null"]
        slots:
          type: array
          items:
            $ref: "#/components/schemas/DoctorSlot"

    DoctorSlot:
      type: object
      required: [day, startTime, endTime]
      properties:
        day:
          type: string
        startTime:
          type: string
        endTime:
          type: string

    DoctorInput:
      type: object
      required: [name, specialization]
      properties:
        name:
          type: string
        specialization:
          type: string
        qualifications:
          type: string
        experience:
          type: integer
        email:
          type: string
        mobile:
          type: string
        bio:
          type: string
        registrationNumber:
          type: string
        slots:
          type: array
          items:
            $ref: "#/components/schemas/DoctorSlot"

    DoctorUpdate:
      type: object
      properties:
        name:
          type: string
        specialization:
          type: string
        qualifications:
          type: string
        experience:
          type: integer
        active:
          type: boolean
        email:
          type: string
        mobile:
          type: string
        bio:
          type: string
        registrationNumber:
          type: string
        slots:
          type: array
          items:
            $ref: "#/components/schemas/DoctorSlot"

    # ── Contact Variable ──────────────────────────────────────────────────────
    ContactVariable:
      type: object
      required: [id, name, description, mandatory, system]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        mandatory:
          type: boolean
        system:
          type: boolean

    ContactVariableInput:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
        description:
          type: string
        mandatory:
          type: boolean

    ContactVariableUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        mandatory:
          type: boolean

    # ── Lead ─────────────────────────────────────────────────────────────────
    Lead:
      type: object
      required: [id, firstName, lastName, mobile, sourceChannel, status, optedIn, dndListed, createdAt, lastActionAt]
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        mobile:
          type: string
        uhid:
          type: ["string", "null"]
        specialization:
          type: ["string", "null"]
        sourceChannel:
          type: string
          enum: [waba, web_chat, form, csv, app_booking, web_booking, push]
        status:
          type: string
          enum: [new, contacted, in_progress, fulfilled, closed]
        ownerUserId:
          type: ["integer", "null"]
        ownerName:
          type: ["string", "null"]
        sourceListTag:
          type: ["string", "null"]
        optedIn:
          type: boolean
        dndListed:
          type: boolean
        createdAt:
          type: string
        lastActionAt:
          type: string
        hasActiveSession:
          type: boolean

    LeadDetail:
      type: object
      required: [id, firstName, lastName, mobile, sourceChannel, status, optedIn, dndListed, createdAt, lastActionAt, activityLog]
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        mobile:
          type: string
        uhid:
          type: ["string", "null"]
        specialization:
          type: ["string", "null"]
        sourceChannel:
          type: string
          enum: [waba, web_chat, form, csv, app_booking, web_booking, push]
        status:
          type: string
          enum: [new, contacted, in_progress, fulfilled, closed]
        ownerUserId:
          type: ["integer", "null"]
        ownerName:
          type: ["string", "null"]
        sourceListTag:
          type: ["string", "null"]
        optedIn:
          type: boolean
        dndListed:
          type: boolean
        createdAt:
          type: string
        lastActionAt:
          type: string
        hasActiveSession:
          type: boolean
        activityLog:
          type: array
          items:
            $ref: "#/components/schemas/ActivityLogEntry"

    ActivityLogEntry:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        createdAt:
          type: string
        userId:
          type: ["integer", "null"]
        userName:
          type: ["string", "null"]

    LeadInput:
      type: object
      required: [firstName, lastName, mobile, sourceChannel]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        mobile:
          type: string
        uhid:
          type: string
        specialization:
          type: string
        sourceChannel:
          type: string
          enum: [waba, web_chat, form, csv, app_booking, web_booking, push]
        optedIn:
          type: boolean
        sourceListTag:
          type: string

    LeadUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [new, contacted, in_progress, fulfilled, closed]
        ownerUserId:
          type: ["integer", "null"]
        specialization:
          type: string
        optedIn:
          type: boolean
        dndListed:
          type: boolean

    Message:
      type: object
      required: [id, leadId, direction, body, channel, timestamp]
      properties:
        id:
          type: integer
        leadId:
          type: integer
        direction:
          type: string
          enum: [in, out]
        body:
          type: string
        channel:
          type: string
        templateId:
          type: ["integer", "null"]
        timestamp:
          type: string
        status:
          type: string

    MessageInput:
      type: object
      required: [templateId, channel]
      properties:
        templateId:
          type: integer
        channel:
          type: string
        body:
          type: ["string", "null"]

    SimulateInboundInput:
      type: object
      required: [channel]
      properties:
        channel:
          type: string
          enum: [waba, web_chat]
        mobile:
          type: ["string", "null"]
        body:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]

    CsvUploadInput:
      type: object
      required: [rows, columnMapping, sourceListTag]
      properties:
        rows:
          type: array
          items:
            type: object
            additionalProperties:
              type: string
        columnMapping:
          type: object
          additionalProperties:
            type: string
        sourceListTag:
          type: string
        saveAsSegment:
          type: boolean
        segmentName:
          type: ["string", "null"]

    CsvUploadResult:
      type: object
      required: [imported, duplicates, errors, segmentId]
      properties:
        imported:
          type: integer
        duplicates:
          type: integer
        errors:
          type: array
          items:
            type: string
        segmentId:
          type: ["integer", "null"]

    GroupSegmentInput:
      type: object
      required: [leadIds, name]
      properties:
        leadIds:
          type: array
          items:
            type: integer
        name:
          type: string
        description:
          type: ["string", "null"]

    # ── Appointment ───────────────────────────────────────────────────────────
    Appointment:
      type: object
      required: [id, leadId, doctorId, specialization, sourceChannel, status, datetime, createdAt]
      properties:
        id:
          type: integer
        leadId:
          type: integer
        leadName:
          type: ["string", "null"]
        leadMobile:
          type: ["string", "null"]
        leadUhid:
          type: ["string", "null"]
        doctorId:
          type: integer
        doctorName:
          type: ["string", "null"]
        specialization:
          type: string
        sourceChannel:
          type: string
          enum: [app_booking, web_booking, walk_in, form]
        status:
          type: string
          enum: [booked, confirmed, completed, cancelled]
        token:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        datetime:
          type: string
        createdAt:
          type: string

    AppointmentInput:
      type: object
      required: [doctorId, specialization, sourceChannel, datetime]
      properties:
        leadId:
          type: integer
        patientName:
          type: string
        patientMobile:
          type: string
        patientUhid:
          type: string
        doctorId:
          type: integer
        specialization:
          type: string
        sourceChannel:
          type: string
          enum: [app_booking, web_booking, walk_in, form]
        datetime:
          type: string
        notes:
          type: string

    AppointmentUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [booked, confirmed, completed, cancelled]
        datetime:
          type: string
        notes:
          type: string
        token:
          type: string

    # ── Segment ────────────────────────────────────────────────────────────────
    Segment:
      type: object
      required: [id, name, source, count, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        source:
          type: string
          enum: [affordplan, his, csv, manual]
        conditionTree:
          type: ["string", "null"]
        count:
          type: integer
        lastRefreshAt:
          type: string
        createdAt:
          type: string

    SegmentInput:
      type: object
      required: [name, source]
      properties:
        name:
          type: string
        description:
          type: string
        source:
          type: string
          enum: [affordplan, his, csv, manual]
        conditionTree:
          type: string
        memberLeadIds:
          type: array
          items:
            type: integer

    # ── Template ───────────────────────────────────────────────────────────────
    Template:
      type: object
      required: [id, name, channel, goal, language, body, status]
      properties:
        id:
          type: integer
        name:
          type: string
        channel:
          type: string
          enum: [sms, whatsapp, push]
        goal:
          type: string
        language:
          type: string
        body:
          type: string
        media:
          type: ["string", "null"]
        status:
          type: string
          enum: [approved, pending, rejected]
        scope:
          type: string
          enum: [global, hospital]
        dltRegisteredBody:
          type: ["string", "null"]
        metaStatus:
          type: ["string", "null"]
        qualityRating:
          type: ["string", "null"]
        senderId:
          type: ["string", "null"]
        wabaContact:
          type: ["string", "null"]
        perMessageCost:
          type: number

    TemplateUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [approved, pending, rejected]
        dltRegisteredBody:
          type: string
        metaStatus:
          type: string
        qualityRating:
          type: string
        senderId:
          type: string
        wabaContact:
          type: string
        scope:
          type: string
          enum: [global, hospital]

    # ── Template Request ──────────────────────────────────────────────────────
    TemplateRequest:
      type: object
      required: [id, name, channel, message, goal, approvalStage, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        channel:
          type: string
          enum: [sms, whatsapp, push]
        message:
          type: string
        media:
          type: ["string", "null"]
        goal:
          type: string
        variables:
          type: ["string", "null"]
        approvalStage:
          type: string
          enum: [ap_marketing, channel_compliance, live, rejected]
        createdBy:
          type: integer
        createdByName:
          type: ["string", "null"]
        createdAt:
          type: string
        rejectionReason:
          type: ["string", "null"]

    TemplateRequestInput:
      type: object
      required: [name, channel, message, goal]
      properties:
        name:
          type: string
        channel:
          type: string
          enum: [sms, whatsapp, push]
        message:
          type: string
        media:
          type: string
        goal:
          type: string
        variables:
          type: string

    TemplateRequestUpdate:
      type: object
      properties:
        approvalStage:
          type: string
          enum: [ap_marketing, channel_compliance, live, rejected]
        rejectionReason:
          type: string

    # ── Campaign ──────────────────────────────────────────────────────────────
    CampaignChannel:
      type: object
      required: [channel, templateId, perMessageCost]
      properties:
        channel:
          type: string
          enum: [sms, whatsapp, push]
        templateId:
          type: integer
        templateName:
          type: ["string", "null"]
        perMessageCost:
          type: number
        senderId:
          type: ["string", "null"]
        wabaContact:
          type: ["string", "null"]

    CostBreakdown:
      type: object
      required: [channelCost, fee, gst, total]
      properties:
        channelCost:
          type: number
        fee:
          type: number
        gst:
          type: number
        total:
          type: number

    ComplianceCheck:
      type: object
      required: [name, passed, message]
      properties:
        name:
          type: string
        passed:
          type: boolean
        message:
          type: string
        droppedCount:
          type: ["integer", "null"]

    Campaign:
      type: object
      required: [id, name, goal, audienceSegmentId, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        goal:
          type: string
        audienceSegmentId:
          type: integer
        audienceSegmentName:
          type: ["string", "null"]
        channels:
          type: array
          items:
            $ref: "#/components/schemas/CampaignChannel"
        estimatedRecipients:
          type: ["integer", "null"]
        costBreakdown:
          type: ["object", "null"]
          properties:
            channelCost:
              type: number
            fee:
              type: number
            gst:
              type: number
            total:
              type: number
        status:
          type: string
          enum: [draft, submitted, approved, live, paused, completed, failed]
        complianceResult:
          type: ["object", "null"]
          properties:
            checks:
              type: array
              items:
                $ref: "#/components/schemas/ComplianceCheck"
            passed:
              type: boolean
        createdBy:
          type: integer
        createdByName:
          type: ["string", "null"]
        approvedBy:
          type: ["integer", "null"]
        approvedByName:
          type: ["string", "null"]
        createdAt:
          type: string
        launchedAt:
          type: ["string", "null"]

    CampaignInput:
      type: object
      required: [name, goal, audienceSegmentId]
      properties:
        name:
          type: string
        goal:
          type: string
        audienceSegmentId:
          type: integer
        channels:
          type: array
          items:
            $ref: "#/components/schemas/CampaignChannel"

    CampaignUpdate:
      type: object
      properties:
        name:
          type: string
        goal:
          type: string
        audienceSegmentId:
          type: integer
        channels:
          type: array
          items:
            $ref: "#/components/schemas/CampaignChannel"

    CampaignApprovalResult:
      type: object
      required: [campaign, complianceChecks, passed]
      properties:
        campaign:
          $ref: "#/components/schemas/Campaign"
        complianceChecks:
          type: array
          items:
            $ref: "#/components/schemas/ComplianceCheck"
        passed:
          type: boolean
        invoice:
          type: ["object", "null"]
          properties:
            id:
              type: integer
            number:
              type: string
            amount:
              type: number
            gst:
              type: number

    CampaignMetrics:
      type: object
      required: [campaignId]
      properties:
        campaignId:
          type: integer
        sent:
          type: integer
        delivered:
          type: integer
        opened:
          type: integer
        clicked:
          type: integer
        converted:
          type: integer
        spend:
          type: number
        revenueAttributed:
          type: number
        roi:
          type: number
        channelBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/ChannelMetrics"
        updatedAt:
          type: string

    ChannelMetrics:
      type: object
      required: [channel, sent, delivered, opened, clicked, converted]
      properties:
        channel:
          type: string
        sent:
          type: integer
        delivered:
          type: integer
        opened:
          type: integer
        clicked:
          type: integer
        converted:
          type: integer
        spend:
          type: number
        revenueAttributed:
          type: number

    # ── Wallet ────────────────────────────────────────────────────────────────
    WalletTransaction:
      type: object
      required: [id, type, amount, description, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [topup, debit]
        amount:
          type: number
        description:
          type: string
        reference:
          type: ["string", "null"]
        createdAt:
          type: string

    Wallet:
      type: object
      required: [balance, transactions]
      properties:
        balance:
          type: number
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/WalletTransaction"

    WalletTopupInput:
      type: object
      required: [amount]
      properties:
        amount:
          type: number

    # ── Invoice ───────────────────────────────────────────────────────────────
    Invoice:
      type: object
      required: [id, number, amount, gst, createdAt]
      properties:
        id:
          type: integer
        campaignId:
          type: ["integer", "null"]
        campaignName:
          type: ["string", "null"]
        number:
          type: string
        amount:
          type: number
        gst:
          type: number
        pdfUrl:
          type: string
        createdAt:
          type: string

    # ── Channel Config ─────────────────────────────────────────────────────────
    SmsHeader:
      type: object
      required: [value, ownership, isDefault]
      properties:
        value:
          type: string
        ownership:
          type: string
          enum: [affordplan, hospital]
        isDefault:
          type: boolean

    WabaNumber:
      type: object
      required: [number, ownership, isDefault]
      properties:
        number:
          type: string
        profilePic:
          type: ["string", "null"]
        ownership:
          type: string
          enum: [affordplan, hospital]
        isDefault:
          type: boolean

    ChannelConfigEntry:
      type: object
      required: [type, status]
      properties:
        type:
          type: string
          enum: [sms, whatsapp, push]
        status:
          type: string
          enum: [live, not_configured, pending, error]
        smsHeaders:
          type: array
          items:
            $ref: "#/components/schemas/SmsHeader"
        wabaNumbers:
          type: array
          items:
            $ref: "#/components/schemas/WabaNumber"
        pushWorkspaceId:
          type: ["string", "null"]

    ChannelConfig:
      type: object
      required: [channels]
      properties:
        channels:
          type: array
          items:
            $ref: "#/components/schemas/ChannelConfigEntry"

    ChannelConfigUpdate:
      type: object
      properties:
        channels:
          type: array
          items:
            $ref: "#/components/schemas/ChannelConfigEntry"

    # ── Send Rules ────────────────────────────────────────────────────────────
    SendRules:
      type: object
      required: [sendWindowStart, sendWindowEnd, frequencyCap]
      properties:
        sendWindowStart:
          type: string
        sendWindowEnd:
          type: string
        frequencyCap:
          type: integer

    SendRulesUpdate:
      type: object
      properties:
        sendWindowStart:
          type: string
        sendWindowEnd:
          type: string
        frequencyCap:
          type: integer

    # ── Notifications ─────────────────────────────────────────────────────────
    Notification:
      type: object
      required: [id, title, body, read, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        type:
          type: string
        read:
          type: boolean
        createdAt:
          type: string

    # ── Dashboard ──────────────────────────────────────────────────────────────
    LeadsByChannel:
      type: object
      required: [channel, count]
      properties:
        channel:
          type: string
        count:
          type: integer

    LeadsByStatus:
      type: object
      required: [status, count]
      properties:
        status:
          type: string
        count:
          type: integer

    HomeDashboard:
      type: object
      required: [totalLeads, activeLeads, fulfilledLeads, leadsByChannel, leadsByStatus, conversionByChannel, recentLeads]
      properties:
        totalLeads:
          type: integer
        activeLeads:
          type: integer
        fulfilledLeads:
          type: integer
        leadsByChannel:
          type: array
          items:
            $ref: "#/components/schemas/LeadsByChannel"
        leadsByStatus:
          type: array
          items:
            $ref: "#/components/schemas/LeadsByStatus"
        conversionByChannel:
          type: array
          items:
            type: object
            required: [channel, total, converted, rate]
            properties:
              channel:
                type: string
              total:
                type: integer
              converted:
                type: integer
              rate:
                type: number
        revenueAttributed:
          type: number
        recentLeads:
          type: array
          items:
            $ref: "#/components/schemas/Lead"
        appointmentSummary:
          type: object
          properties:
            total:
              type: integer
            today:
              type: integer
            upcoming:
              type: integer

    CrmDashboard:
      type: object
      required: [totalLeads, leadsByChannel, volumeTrend, slaBreaches]
      properties:
        totalLeads:
          type: integer
        leadsByChannel:
          type: array
          items:
            $ref: "#/components/schemas/LeadsByChannel"
        volumeTrend:
          type: array
          items:
            type: object
            required: [date, count]
            properties:
              date:
                type: string
              count:
                type: integer
        conversionTrend:
          type: array
          items:
            type: object
            required: [date, converted]
            properties:
              date:
                type: string
              converted:
                type: integer
        slaBreaches:
          type: integer
        agedLeads:
          type: array
          items:
            $ref: "#/components/schemas/Lead"

    EngagementDashboard:
      type: object
      required: [patientsReachedMtd, deliveryRate, conversions, activeCampaigns, recentCampaigns]
      properties:
        patientsReachedMtd:
          type: integer
        deliveryRate:
          type: number
        conversions:
          type: integer
        activeCampaigns:
          type: integer
        walletBalance:
          type: number
        recentCampaigns:
          type: array
          items:
            $ref: "#/components/schemas/Campaign"
        spendTrend:
          type: array
          items:
            type: object
            required: [date, spend]
            properties:
              date:
                type: string
              spend:
                type: number

    AppointmentsDashboard:
      type: object
      required: [total, byChannel, byStatus, bySpecialization, recentAppointments]
      properties:
        total:
          type: integer
        today:
          type: integer
        byChannel:
          type: array
          items:
            type: object
            required: [channel, count]
            properties:
              channel:
                type: string
              count:
                type: integer
        byStatus:
          type: array
          items:
            type: object
            required: [status, count]
            properties:
              status:
                type: string
              count:
                type: integer
        bySpecialization:
          type: array
          items:
            type: object
            required: [specialization, count]
            properties:
              specialization:
                type: string
              count:
                type: integer
        trendByDay:
          type: array
          items:
            type: object
            required: [date, count]
            properties:
              date:
                type: string
              count:
                type: integer
        recentAppointments:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"

    SuperAdminDashboard:
      type: object
      required: [totalCampaigns, pendingTemplateRequests, pendingCampaigns, channelStatus]
      properties:
        totalCampaigns:
          type: integer
        pendingTemplateRequests:
          type: integer
        pendingCampaigns:
          type: integer
        channelStatus:
          type: array
          items:
            type: object
            required: [channel, status]
            properties:
              channel:
                type: string
              status:
                type: string

    # ── Public Form ───────────────────────────────────────────────────────────
    PublicFormInput:
      type: object
      required: [firstName, lastName, mobile]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        mobile:
          type: string
        specialization:
          type: string
        message:
          type: string
        preferredDate:
          type: string
