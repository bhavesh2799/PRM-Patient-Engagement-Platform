kind = "web"
previewPath = "/"
title = "Hospital CRM & Patient Engagement"
version = "1.0.0"
id = "artifacts/hospital-crm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20810

[services.development]
run = "pnpm --filter @workspace/hospital-crm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hospital-crm", "run", "build" ]
publicDir = "artifacts/hospital-crm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20810"
BASE_PATH = "/"
