services:
  - type: web
    name: prm-patient-engagement
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm run typecheck && pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run build && PORT=3000 BASE_PATH=/ pnpm --filter @workspace/hospital-crm run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: DATABASE_URL
        sync: false