services:
  - type: web
    name: prm-patient-engagement
    runtime: node
    plan: free
    # This builds core dependencies first, then builds the sandbox apps
    buildCommand: pnpm install && pnpm run typecheck && pnpm --recursive run build
    startCommand: pnpm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
