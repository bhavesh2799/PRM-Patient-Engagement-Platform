services:
  - type: web
    name: prm-patient-engagement
    runtime: node
    plan: free
    # Step 1: Install modules -> Step 2: Build dependencies -> Step 3: Run target sandbox with explicit error reporting
    buildCommand: pnpm install && pnpm run typecheck && pnpm --filter @workspace/mockup-sandbox run build --debug
    startCommand: pnpm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
