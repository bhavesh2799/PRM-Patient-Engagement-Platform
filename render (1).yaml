services:
  - type: web
    name: prm-patient-engagement
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm run typecheck && pnpm --filter @workspace/mockup-sandbox run build --debug
    startCommand: pnpm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
