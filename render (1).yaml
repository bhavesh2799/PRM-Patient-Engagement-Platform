services:
  - type: web
    name: prm-patient-engagement
    runtime: node
    plan: free
    # Build step: Installs workspace tools, builds the backend server, and builds the crm app
    buildCommand: pnpm install && pnpm run typecheck && pnpm --filter @workspace/api-server run build && pnpm --filter hospital-crm run build
    # Start step: Start the Node backend in the background, then serve the Frontend app on the expected port
    startCommand: node artifacts/api-server/dist/index.js & npx serve -s hospital-crm/dist -l 10000
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
